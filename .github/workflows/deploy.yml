name: Deploy website

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate HTML
        run: npx --yes html-validate $(find . -name '*.html' -not -path './.git/*')

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --max-retries 2
            --exclude '^https://(www\.)?linkedin\.com/'
            --exclude '^https://canva\.link/'
            .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-dependencies: true

      - name: Accessibility audit
        run: |
          npx --yes http-server -p 8765 -c-1 -s &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          sleep 3
          find . -name '*.html' -not -path './.git/*' | sed 's|^\./||' | \
            jq -R -s --arg chrome "${{ steps.setup-chrome.outputs.chrome-path }}" \
              'split("\n") | map(select(length>0)) | map("http://127.0.0.1:8765/" + .) | {defaults: {standard: "WCAG2AA", chromeLaunchConfig: {executablePath: $chrome, args: ["--no-sandbox", "--disable-setuid-sandbox"]}}, urls: .}' \
            > .pa11yci.json
          npx --yes pa11y-ci --config .pa11yci.json

  deploy:
    name: Deploy to AWS
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync files to S3
        run: |
          aws s3 sync . s3://${{ vars.S3_BUCKET }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"